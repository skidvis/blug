name: Build and Deploy to Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login to Docker
      run: echo "${{ secrets.DOCKER_PASS }}" | docker login --username ${{ secrets.DOCKER_USER }} --password-stdin
    - name: Build the Docker image
      run: docker build --build-arg SITE_URL=${{ secrets.SITE_URL }} -t ${{ secrets.DOCKER_USER }}/blug:latest .
    - name: Push the Docker image
      run: docker push ${{ secrets.DOCKER_USER }}/blug:latest
